# Aggregation Schema Definitions

type AccountAmountSummary {
  ledgerAccount: LedgerAccount!
  totalAmount: Int!
  ratio: Float!
}

type ExpenseSummary {
  totalAmount: Int!
  byAccount: [AccountAmountSummary!]!
}

type RevenueSummary {
  totalAmount: Int!
  byAccount: [AccountAmountSummary!]!
}

# Aggregated financial data for a given date range
type PeriodAggregation {
  startDate: Date!
  endDate: Date!
  expenses: ExpenseSummary!
  revenue: RevenueSummary!
  # Net amount: revenue.totalAmount - expenses.totalAmount
  netAmount: Int!
}

# Ratio breakdown of direct children of a given LedgerAccount for a period
type ChildAccountBreakdown {
  parent: LedgerAccount!
  startDate: Date!
  endDate: Date!
  totalAmount: Int!
  children: [AccountAmountSummary!]!
}

# Balance of a single ledger account as of a given date
type AccountBalance {
  ledgerAccount: LedgerAccount!
  balance: Int!
  asOf: Date!
}

# Trial balance: balances of all ledger accounts as of a given date
type TrialBalance {
  asOf: Date!
  accounts: [AccountBalance!]!
  # Net worth: total assets - total liabilities
  netWorth: Int!
}

enum Granularity {
  DAILY
  WEEKLY
  MONTHLY
}

# Time-series of PeriodAggregation data points
type PeriodAggregationSeries {
  granularity: Granularity!
  dataPoints: [PeriodAggregation!]!
}

extend type Query {
  periodAggregation(startDate: Date!, endDate: Date!): PeriodAggregation!

  # Time-series aggregation (e.g. monthly expense trend over a year)
  periodAggregationSeries(
    startDate: Date!
    endDate: Date!
    granularity: Granularity!
  ): PeriodAggregationSeries!

  # Trial balance: all account balances as of a given date
  trialBalance(asOf: Date!): TrialBalance!

  childAccountBreakdown(
    parentId: ID!
    startDate: Date!
    endDate: Date!
  ): ChildAccountBreakdown!
}
