# Transaction Schema Definitions

enum JournalEntryKind {
  DEBIT
  CREDIT
}

type JournalEntry {
  ledgerAccount: LedgerAccount!
  amount: Int!
  kind: JournalEntryKind!
}

type Transaction implements Node {
  id: ID!
  entries: [JournalEntry!]!
  date: Date!
  description: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type TransactionConnection {
  edges: [TransactionEdge]
  nodes: [Transaction]
  pageInfo: PageInfo!
  totalCount: Int!
}

type TransactionEdge {
  cursor: ID!
  node: Transaction!
}

extend type Query {
  transaction(id: ID!): Transaction

  transactions(
    first: Int
    after: ID
    last: Int
    before: ID
    startDate: Date
    endDate: Date
  ): TransactionConnection!
}

extend type Mutation {
  createTransaction(input: CreateTransactionInput!): Transaction!

  # This mutation will delete and recreate all entries based on input when input.entries is given.
  updateTransaction(input: UpdateTransactionInput!): Transaction!

  deleteTransaction(id: ID!): DeleteTransactionPayload!

  # adjustAccountBalance(input: AdjustAccountBalanceInput!): Transaction!
}

input JournalEntryInput {
  ledgerAccountId: ID!
  amount: Int!
  kind: JournalEntryKind!
}

input CreateTransactionInput {
  entries: [JournalEntryInput!]!
  date: Date!
  description: String!
}

input UpdateTransactionInput {
  id: ID!
  entries: [JournalEntryInput!]
  date: Date
  description: String
  updatedAt: DateTime!
}

type DeleteTransactionPayload {
  success: Boolean!
}

