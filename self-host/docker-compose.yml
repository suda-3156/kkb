# Self-host stack for Raspberry Pi 5 (arm64) behind Tailscale.
# Persistent data lives under ${DATA_ROOT} (an external SSD; see README.md).
# nginx binds to 127.0.0.1 only — expose it over the tailnet with `tailscale serve`.
# Boot order is enforced via depends_on: db -> migrate -> bootstrap -> backend -> frontend -> nginx.

name: ${PROJECT_NAME:-kkb}

services:
  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${DATA_ROOT}/mysql:/var/lib/mysql
      - ${DATA_ROOT}/mysql-log:/var/log/mysql
      - ../db/docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # One-shot: apply versioned atlas migrations, then exit.
  migrate:
    image: arigaio/atlas:latest
    restart: "no"
    command:
      - migrate
      - apply
      - --dir
      - file:///migrations
      - --url
      - mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
    volumes:
      - ../db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # One-shot: create the encryption wrapper key on the filesystem key root.
  # Idempotent (skips if a key version already exists).
  bootstrap:
    build:
      context: ..
      dockerfile: ./self-host/service.dockerfile
    image: ${PROJECT_NAME:-kkb}-api
    restart: "no"
    entrypoint: ["/bin/bootstrap"]
    environment:
      KEY_MANAGER: FILESYSTEM
      KEY_FILESYSTEM_ROOT: /var/lib/keys
    volumes:
      - ${DATA_ROOT}/keys:/var/lib/keys
    networks:
      - app-network

  backend:
    build:
      context: ..
      dockerfile: ./self-host/service.dockerfile
    image: ${PROJECT_NAME:-kkb}-api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: "8080"
      ALLOWED_ORIGINS: ${PUBLIC_URL}
      KEY_MANAGER: FILESYSTEM
      KEY_FILESYSTEM_ROOT: /var/lib/keys
      SECRET_MANAGER: FILESYSTEM
      SECRET_FILESYSTEM_ROOT: /var/lib/secrets
      ENCRYPTION_KMS_KEY_ID: ${ENCRYPTION_KMS_KEY_ID}
      ENCRYPTION_AAD: ${ENCRYPTION_AAD}
      ENCRYPTION_CACHE_TTL: ${ENCRYPTION_CACHE_TTL:-5m}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_MODE: ${LOG_MODE:-json}
    volumes:
      - ${DATA_ROOT}/keys:/var/lib/keys
      - ${DATA_ROOT}/secrets:/var/lib/secrets
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bootstrap:
        condition: service_completed_successfully
    networks:
      - app-network

  frontend:
    build:
      context: ../ts
      dockerfile: ../self-host/next.dockerfile
      args:
        # Browser uses same-origin "/query" (proxied by nginx to the backend).
        NEXT_PUBLIC_GRAPHQL_URL: /query
        NEXT_PUBLIC_TZ: ${TZ}
    restart: always
    environment:
      # Server-side (RSC) reaches the API directly on the internal network.
      GRAPHQL_INTERNAL_URL: http://backend:8080/query
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    # 127.0.0.1 only: published with `tailscale serve` (HTTPS) — never on 0.0.0.0.
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    name: ${PROJECT_NAME:-kkb}-network
