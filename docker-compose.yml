services:
  api:
    container_name: ${PROJECT_NAME}-api
    build:
      context: .
      dockerfile: ./go/Dockerfile
    env_file:
      - ./.env.local
    volumes:
      - ./go/:/app
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - app-network

volumes:
  app-data:
    name: ${PROJECT_NAME}-data

networks:
  app-network:
    name: ${PROJECT_NAME}-network