services:

  db:
    container_name: ${PROJECT_NAME}-db
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_HOST: ${DB_HOST}
      TZ: ${TZ}
    volumes:
      - app-data:/var/lib/mysql
      - ./db/docker/logs:/var/log/mysql
      - ./db/docker/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    container_name: ${PROJECT_NAME}-api
    build:
      context: .
      dockerfile: ./go/Dockerfile
    env_file:
      - ./.env.local
    volumes:
      - ./go/:/app
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  app-data:
    name: ${PROJECT_NAME}-data

networks:
  app-network:
    name: ${PROJECT_NAME}-network